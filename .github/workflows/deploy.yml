name: deploy

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, agent-prod]
    environment:
      name: production
      url: https://${{ vars.EC2_HOST }}/healthz

    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          IMAGE_TAG: ""
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_ACTOR,GITHUB_TOKEN,WORKFLOW_HEAD_SHA,IMAGE_TAG
          script: |
            set -euo pipefail
            cd ~/agent
            SHORT_SHA="$(printf '%s' "$WORKFLOW_HEAD_SHA" | cut -c1-7)"
            export IMAGE_TAG="${IMAGE_TAG:-sha-${SHORT_SHA}}"
            echo "Deploying image tag: ${IMAGE_TAG}"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" docker compose pull agent
            IMAGE_TAG="$IMAGE_TAG" docker compose up -d --no-deps --remove-orphans agent
            sleep 5
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8000/healthz; then
                echo "healthy on attempt $i"
                exit 0
              fi
              sleep 3
            done
            echo "healthcheck failed after 5 attempts"
            exit 1
